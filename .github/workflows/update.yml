name: update french docs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream
        run: |
          git clone --depth 1 https://github.com/openclaw/openclaw.git upstream

      - name: Sync docs
        run: |
          mkdir -p docs/en
          rsync -av --delete --exclude='fr/' upstream/docs/ docs/en/

      - name: Sync images and assets to FR
        run: |
          mkdir -p docs/en/fr/images docs/en/fr/assets
          rsync -av --delete docs/en/images/ docs/en/fr/images/
          rsync -av --delete docs/en/assets/ docs/en/fr/assets/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Translate docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/translate_changed.py

      - name: Inject FR navigation into docs.json
        run: python scripts/inject_fr_nav.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update docs fr"

      - name: Push changes
        run: git push
